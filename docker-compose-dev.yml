services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: gridwatch_user
      POSTGRES_PASSWORD: gridwatch_password
      POSTGRES_DB: gridwatch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    # Override production command to use nodemon locally
    command: npm run dev:docker
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://gridwatch_user:gridwatch_password@db:5432/gridwatch
      - REDIS_URL=redis://redis:6379/0
      - PORT=3000
      # Optional: require X-Api-Key / Authorization: Bearer on POST /ingest
      # - INGEST_API_KEY=dev-shared-secret
    volumes:
      # Mount source code for hot reloading
      - ./backend:/app
      # Required by integration test bootstrap in backend container
      - ./init.sql:/init.sql:ro
      # Keep the container's original node_modules, don't overwrite with host's
      - /app/node_modules
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      # Build only up to the Node.js stage, not the final Nginx stage
      target: builder
    # Override production build command to use Vite dev server
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      # Mount front end source directly for hot-reloading
      - ./frontend:/app
      # Same thing: preserve the container's installed node_modules
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
