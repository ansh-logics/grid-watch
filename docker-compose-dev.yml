services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: gridwatch_user
      POSTGRES_PASSWORD: gridwatch_password
      POSTGRES_DB: gridwatch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    # Override production command to use nodemon locally
    command: npm run dev:docker
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://gridwatch_user:gridwatch_password@db:5432/gridwatch
      - REDIS_URL=redis://redis:6379/0
      - PORT=3000
      # Optional: require X-Api-Key / Authorization: Bearer on POST /ingest
      # - INGEST_API_KEY=dev-shared-secret
    volumes:
      # Mount source code for hot reloading
      - ./backend:/app
      # Required by integration test bootstrap in backend container
      - ./init.sql:/init.sql:ro
      # Keep the container's original node_modules, don't overwrite with host's
      - /app/node_modules
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:3000
      - VITE_DEFAULT_USER_ID=22222222-2222-2222-2222-222222222222
      - VITE_DEFAULT_ZONE_ID=11111111-1111-1111-1111-111111111111
    volumes:
      # Mount front end source directly for hot-reloading
      - ./frontend:/app
      # Same thing: preserve the container's installed node_modules
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
